<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>6ure Files Updates</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0b0d12;
      color: #f4f6fb;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    main {
      width: min(560px, 100%);
      display: grid;
      gap: 14px;
    }

    h1,
    p {
      margin: 0;
    }

    h1 {
      font-size: 24px;
      letter-spacing: 0;
    }

    p {
      color: #b8c0d4;
      line-height: 1.55;
    }

    a {
      color: #67d8ff;
      font-weight: 800;
    }
  </style>
</head>
<body>
  <main>
    <h1>6ure Files Updates</h1>
    <p>This static GitHub Pages site hosts the update manifest used by installed copies of 6ure Files.</p>
    <p><a href="./latest.json">View latest.json</a></p>
  </main>
</body>
</html>
